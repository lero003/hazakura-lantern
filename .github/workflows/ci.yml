name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swiftpm:
    name: SwiftPM
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run tests
        run: swift test

      - name: Build app target
        run: swift build --disable-sandbox
