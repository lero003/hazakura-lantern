name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  swiftpm:
    name: SwiftPM
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tests
        run: swift test

      - name: Build app target
        run: swift build --disable-sandbox
